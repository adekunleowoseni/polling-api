# Apache reverse proxy for api.getedumatrix.com → Docker API on 127.0.0.1:8000
#
# Webuzo / AlmaLinux — run as root on the server.
#
# 1) Find the vhost file:
#    grep -rl "api.getedumatrix.com" /usr/local/emps/etc/apache2/ /etc/httpd/ 2>/dev/null
#    httpd -S 2>/dev/null | grep api
#
# 2) Inside the *:443 VirtualHost for api.getedumatrix.com, add BEFORE </VirtualHost>:
#
#     ProxyPreserveHost On
#     ProxyPass / http://127.0.0.1:8000/
#     ProxyPassReverse / http://127.0.0.1:8000/
#     RewriteEngine On
#     RewriteCond %{HTTP:Upgrade} websocket [NC]
#     RewriteCond %{HTTP:Connection} upgrade [NC]
#     RewriteRule ^/ws/(.*) ws://127.0.0.1:8000/ws/$1 [P,L]
#
# 3) Enable modules and reload:
#     /usr/local/emps/bin/apachectl -M | grep proxy
#     # If missing, ensure these LoadModule lines exist in httpd.conf then:
#     /usr/local/emps/bin/apachectl configtest
#     /usr/local/emps/bin/apachectl graceful
#     # or: systemctl reload httpd
#
# 4) Test:
#     curl http://127.0.0.1:8000/geo/states/ogun/lgas
#     curl https://api.getedumatrix.com/geo/states/ogun/lgas

<VirtualHost *:443>
    ServerName api.getedumatrix.com

    SSLEngine on
    # SSL cert paths are set by Webuzo / certbot — do not remove existing SSL lines.

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws/(.*) ws://127.0.0.1:8000/ws/$1 [P,L]
</VirtualHost>
