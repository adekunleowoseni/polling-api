# Alternative: API under a folder on the edumatrix addon domain
# Example public URL: https://edumatrix.com/poll/
#
# Use this if you cannot use a subdomain and must serve from /poll/.
# Set NUXT_PUBLIC_API_BASE=https://edumatrix.com/poll (no trailing slash).

server {
    listen 80;
    server_name edumatrix.com www.edumatrix.com;

    client_max_body_size 25M;

    location /poll/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /poll/ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
